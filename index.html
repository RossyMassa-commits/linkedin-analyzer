<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkedIn Brand Analyzer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f0f;color:#fff;min-height:100vh;padding:2rem 1rem}
.wrap{max-width:680px;margin:0 auto}
h1{font-size:26px;font-weight:600;margin-bottom:6px}
.sub{color:#888;font-size:14px;margin-bottom:2rem;line-height:1.6}
.field{margin-bottom:1rem}
.field label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:#aaa}
.field input,.field textarea{width:100%;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:10px 14px;color:#fff;font-size:14px;font-family:inherit;resize:vertical;line-height:1.6}
.field input:focus,.field textarea:focus{outline:none;border-color:#444}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 22px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;border:none}
.btn.primary{background:#fff;color:#000}
.btn.primary:hover{background:#eee}
.btn-row{display:flex;gap:8px;margin-top:1.25rem}
.tabs{display:flex;gap:4px;margin-bottom:1.5rem;border-bottom:1px solid #222;padding-bottom:0}
.tab{font-size:13px;padding:8px 16px;border:none;background:none;cursor:pointer;color:#666;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:inherit;font-weight:500}
.tab.active{color:#fff;border-bottom-color:#fff}
.section{display:none}.section.active{display:block}
.card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.card h3{font-size:14px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.badge{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:600}
.badge.good{background:#0d2e1a;color:#4ade80}
.badge.ok{background:#2e1f0d;color:#fb923c}
.badge.bad{background:#2e0d0d;color:#f87171}
.scores{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:1.25rem}
.score-box{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:14px}
.score-box .lbl{font-size:12px;color:#666;margin-bottom:6px}
.score-box .num{font-size:22px;font-weight:600}
.score-box .bar{height:3px;background:#222;border-radius:2px;margin-top:8px}
.score-box .fill{height:3px;border-radius:2px}
.overall-box{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:1.25rem;margin-bottom:1.25rem;display:flex;gap:1.25rem;align-items:flex-start}
.big-score{font-size:42px;font-weight:700;line-height:1;white-space:nowrap}
.big-lbl{font-size:12px;color:#666;margin-top:4px}
.summary{font-size:14px;color:#aaa;line-height:1.6}
.rewrite{background:#111;border-left:3px solid #333;border-radius:0 8px 8px 0;padding:12px 14px;font-size:13px;line-height:1.7;color:#ddd;margin-top:10px;white-space:pre-wrap}
.bullet{font-size:13px;color:#aaa;margin-bottom:8px;padding-left:18px;position:relative;line-height:1.6}
.bullet::before{content:"→";position:absolute;left:0;color:#555}
.copy-btn{font-size:11px;padding:3px 10px;margin-left:auto;background:transparent;border:1px solid #333;border-radius:6px;color:#888;cursor:pointer;font-family:inherit}
.copy-btn:hover{color:#fff;border-color:#555}
.ideas{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.idea{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:12px 14px;font-size:13px;color:#aaa;line-height:1.5}
.cal-item{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:12px 14px;margin-bottom:8px;font-size:13px;color:#aaa;line-height:1.5}
.cal-day{font-size:11px;color:#555;margin-bottom:4px}
.hook-item{background:#111;border-left:3px solid #4ade80;padding:10px 14px;margin-bottom:8px;font-size:13px;color:#ddd;line-height:1.6;border-radius:0 8px 8px 0}
.loading{display:none;align-items:center;gap:10px;font-size:14px;color:#666;padding:2rem 0}
.loading.show{display:flex}
.dot{width:6px;height:6px;border-radius:50%;background:#444;animation:pulse 1.4s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{opacity:.3}40%{opacity:1}}
.compare{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:10px}
.compare-box{background:#111;border-radius:8px;padding:12px 14px;font-size:13px;line-height:1.7;color:#ddd}
.compare-label{font-size:11px;color:#555;margin-bottom:6px;font-weight:600;text-transform:uppercase}
</style>
</head>
<body>
<div class="wrap">
  <h1>LinkedIn brand analyzer</h1>
  <p class="sub">Paste your profile and get AI-powered scores, rewrites, content calendar, and viral hooks.</p>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('input')">Your profile</button>
    <button class="tab" onclick="switchTab('result')" id="tab-result" style="display:none">Analysis</button>
    <button class="tab" onclick="switchTab('calendar')" id="tab-cal" style="display:none">30-day calendar</button>
    <button class="tab" onclick="switchTab('hooks')" id="tab-hooks" style="display:none">Viral hooks</button>
  </div>

  <div class="section active" id="sec-input">
    <div class="field">
      <label>Your name & headline</label>
      <input type="text" id="inp-title" placeholder="e.g. Maria Silva | Founder at TechCo | Helping startups grow" />
    </div>
    <div class="field">
      <label>About section</label>
      <textarea id="inp-about" rows="6" placeholder="Paste your LinkedIn About section here..."></textarea>
    </div>
    <div class="field">
      <label>A recent post (optional)</label>
      <textarea id="inp-post" rows="4" placeholder="Paste a recent LinkedIn post..."></textarea>
    </div>
    <div class="field">
      <label>Your industry / niche</label>
      <input type="text" id="inp-niche" placeholder="e.g. SaaS founder, marketing consultant, UX designer..." />
    </div>
    <div class="btn-row">
      <button class="btn primary" onclick="analyze()">✦ Analyze my profile</button>
    </div>
  </div>

  <div class="section" id="sec-result">
    <div class="loading" id="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span>Claude is analyzing your profile...</span></div>
    <div id="result-content"></div>
  </div>

  <div class="section" id="sec-calendar">
    <div id="cal-content"></div>
  </div>

  <div class="section" id="sec-hooks">
    <div id="hooks-content"></div>
  </div>
</div>

<script>
function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  const tabs=['input','result','calendar','hooks'];
  document.querySelectorAll('.tab')[tabs.indexOf(name)].classList.add('active');
  document.getElementById('sec-'+name).classList.add('active');
}

function scoreColor(n){return n>=8?'#4ade80':n>=5?'#fb923c':'#f87171'}
function scoreBadge(n){return n>=8?'good':n>=5?'ok':'bad'}
function scoreLabel(n){return n>=8?'strong':n>=5?'needs work':'weak'}

async function callClaude(prompt){
  const res = await fetch('/api/analyze',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:2000,messages:[{role:'user',content:prompt}]})
  });
  const data = await res.json();
  if(data.error) throw new Error(data.error.message);
  let text = data.content.map(c=>c.text||'').join('');
  return text.replace(/```json|```/g,'').trim();
}

async function analyze(){
  const title = document.getElementById('inp-title').value.trim();
  const about = document.getElementById('inp-about').value.trim();
  const post = document.getElementById('inp-post').value.trim();
  const niche = document.getElementById('inp-niche').value.trim();
  if(!title && !about){alert('Please paste at least your headline or about section.');return;}

  document.getElementById('tab-result').style.display='';
  document.getElementById('tab-cal').style.display='';
  document.getElementById('tab-hooks').style.display='';
  switchTab('result');

  const loading = document.getElementById('loading');
  const content = document.getElementById('result-content');
  loading.classList.add('show');
  content.innerHTML='';

  try{
    const text = await callClaude(`You are a LinkedIn brand expert. Analyze this profile and return ONLY a JSON object, no markdown.

Title: ${title||'Not provided'}
About: ${about||'Not provided'}
Post: ${post||'Not provided'}
Industry: ${niche||'Not specified'}

Return exactly:
{"overall":<1-10>,"overall_summary":"<2 sentences>","scores":{"headline":<1-10>,"about":<1-10>,"clarity":<1-10>,"uniqueness":<1-10>,"cta":<1-10>},"headline_original":"${(title||'').replace(/"/g,"'")}","headline_rewrite":"<improved>","headline_why":"<one sentence>","about_original":"${(about||'').substring(0,200).replace(/"/g,"'")}","about_rewrite":"<improved max 120 words>","about_why":"<one sentence>","post_feedback":"<2-3 sentences>","quick_wins":["<win1>","<win2>","<win3>"]}`);

    const j = JSON.parse(text);

    const calText = await callClaude(`You are a LinkedIn content strategist. Create a 30-day content calendar for someone in this niche: ${niche||'business'}.
Return ONLY a JSON array of 30 objects like: [{"day":1,"topic":"<topic>","format":"<Story|Tip|Opinion|Case study|List>","hook":"<opening line>"}]`);

    const calData = JSON.parse(calText);

    const hooksText = await callClaude(`Generate 5 viral LinkedIn post hooks for someone in this niche: ${niche||'business'}.
Return ONLY a JSON array: ["<hook1>","<hook2>","<hook3>","<hook4>","<hook5>"]`);

    const hooksData = JSON.parse(hooksText);

    loading.classList.remove('show');
    renderResult(j);
    renderCalendar(calData);
    renderHooks(hooksData);

  }catch(e){
    loading.classList.remove('show');
    content.innerHTML='<p style="color:#f87171;font-size:14px;padding:1rem 0">Error: '+e.message+'</p>';
  }
}

function renderResult(j){
  const sc=j.scores;
  document.getElementById('result-content').innerHTML=`
    <div class="overall-box">
      <div><div class="big-score">${j.overall}<span style="font-size:20px;color:#444">/10</span></div><div class="big-lbl">overall score</div></div>
      <div class="summary">${j.overall_summary}</div>
    </div>
    <div class="scores">
      ${[['Headline',sc.headline],['About',sc.about],['Clarity',sc.clarity],['Uniqueness',sc.uniqueness],['CTA',sc.cta]].map(([k,v])=>`
        <div class="score-box"><div class="lbl">${k}</div><div class="num" style="color:${scoreColor(v)}">${v}/10</div>
        <div class="bar"><div class="fill" style="width:${v*10}%;background:${scoreColor(v)}"></div></div></div>`).join('')}
    </div>
    <div class="card">
      <h3>Headline <span class="badge ${scoreBadge(sc.headline)}">${scoreLabel(sc.headline)}</span><button class="copy-btn" onclick="copyIt(this,'${esc(j.headline_rewrite)}')">copy</button></h3>
      <div class="bullet">${j.headline_why}</div>
      <div class="compare">
        <div class="compare-box"><div class="compare-label">Before</div>${j.headline_original||'—'}</div>
        <div class="compare-box" style="border-left:3px solid #4ade80"><div class="compare-label" style="color:#4ade80">After</div>${j.headline_rewrite}</div>
      </div>
    </div>
    <div class="card">
      <h3>About section <span class="badge ${scoreBadge(sc.about)}">${scoreLabel(sc.about)}</span><button class="copy-btn" onclick="copyIt(this,'${esc(j.about_rewrite)}')">copy</button></h3>
      <div class="bullet">${j.about_why}</div>
      <div class="compare">
        <div class="compare-box"><div class="compare-label">Before</div>${j.about_original||'—'}</div>
        <div class="compare-box" style="border-left:3px solid #4ade80"><div class="compare-label" style="color:#4ade80">After</div>${j.about_rewrite}</div>
      </div>
    </div>
    <div class="card"><h3>Post feedback</h3><div class="bullet">${j.post_feedback}</div></div>
    <div class="card"><h3>Quick wins</h3>${j.quick_wins.map(w=>`<div class="bullet">${w}</div>`).join('')}</div>`;
}

function renderCalendar(data){
  document.getElementById('cal-content').innerHTML=`
    <p style="font-size:14px;color:#666;margin-bottom:1rem">Your 30-day LinkedIn content plan.</p>
    ${data.map(d=>`<div class="cal-item"><div class="cal-day">Day ${d.day} · ${d.format}</div><strong style="color:#fff">${d.topic}</strong><div style="margin-top:4px;color:#666">${d.hook}</div></div>`).join('')}`;
}

function renderHooks(data){
  document.getElementById('hooks-content').innerHTML=`
    <p style="font-size:14px;color:#666;margin-bottom:1rem">5 viral openers you can use right now.</p>
    ${data.map((h,i)=>`<div class="hook-item"><span style="color:#4ade80;font-size:11px;font-weight:600">HOOK ${i+1}</span><br>${h}<button class="copy-btn" style="margin-top:8px;display:block" onclick="copyIt(this,'${esc(h)}')">copy</button></div>`).join('')}`;
}

function esc(s){return(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,' ')}

function copyIt(btn,text){
  navigator.clipboard.writeText(text).then(()=>{btn.textContent='copied!';setTimeout(()=>btn.textContent='copy',2000)});
}
</script>
</body>
</html>
